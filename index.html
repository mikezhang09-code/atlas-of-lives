<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>山河行旅图 | 文学叙事地图</title>
  <meta name="description" content="用真实中国山河地图讲述诗人的行旅、作品与心境。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="vendor/maplibre-gl.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main id="app">
    <div id="map" aria-label="诗人生平山河地图"></div>
    <div class="paper"></div>
    <div class="vignette"></div>
    <canvas id="mist"></canvas>

    <header class="titlebar">
      <p id="titleKicker">真实山河 · 文学行旅 · 可漫游叙事地图</p>
      <h1 id="titleHeading">东坡行旅图</h1>
      <p id="titleSubtitle">从眉山到儋州，把苏轼的一生落回山川与江河</p>
    </header>

    <section class="search" aria-label="搜索地点或作品">
      <label for="searchInput">搜地点 / 诗文</label>
      <div>
        <input id="searchInput" type="search" autocomplete="off" placeholder="黄州、赤壁赋、荔枝">
        <button id="searchClear" type="button" aria-label="清空搜索">清</button>
      </div>
      <div id="searchResults" class="search-results" hidden></div>
    </section>

    <section id="personSwitch" class="person-switch" aria-label="选择诗人">
      <button class="person-tab on" type="button" data-journey="sushi">东坡</button>
      <button class="person-tab" type="button" data-journey="libai">太白</button>
    </section>

    <section id="filters" class="filters" aria-label="筛选">
    </section>

    <aside class="story" aria-live="polite">
      <div class="story-head">
        <span id="storyYears">1037-1101</span>
        <strong id="storyTitle">苏轼生平节点</strong>
      </div>
      <p id="storyText">点击地图上的竖牌，查看地点、诗句与生平事件；也可以用下方按钮切换前后节点。</p>
      <div id="storyWorks" class="works"></div>
      <blockquote id="storyQuote">竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。</blockquote>
      <button id="poemOpen" class="poem-open" type="button">阅读全文</button>
      <div class="progress">
        <span id="progressText">第 1 / 11 站</span>
        <i><b id="progressBar"></b></i>
      </div>
      <div class="story-actions">
        <button id="prevBtn" type="button">上一站</button>
        <button id="nextBtn" type="button">下一站</button>
      </div>
    </aside>

    <ol id="timeline" class="timeline" aria-label="诗人生平时间线"></ol>

    <section id="poemModal" class="poem-modal" aria-labelledby="poemTitle" aria-modal="true" role="dialog" hidden>
      <button id="poemBackdrop" class="poem-backdrop" type="button" aria-label="关闭诗词全文"></button>
      <article class="poem-sheet">
        <button id="poemClose" class="poem-close" type="button" aria-label="关闭">×</button>
        <p id="poemAuthor" class="poem-author"></p>
        <h2 id="poemTitle"></h2>
        <div id="poemBody" class="poem-body"></div>
      </article>
    </section>

    <div id="loader" class="loader">
      <div>
        <strong>铺开山河画卷</strong>
        <span>正在载入中国边界、水系与东坡行旅节点</span>
      </div>
    </div>
  </main>

  <script src="vendor/maplibre-gl.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
