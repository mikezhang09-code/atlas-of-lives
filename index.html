<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>山河列传 · Atlas of Lives</title>
  <meta name="description" content="山河列传 · Atlas of Lives：把古今中外人物的一生，落回全球真实山河的叙事地图。">
  <meta name="theme-color" content="#ece2c8">
  <link rel="canonical" href="https://mikezhang09-code.github.io/atlas-of-lives/">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <!-- Open Graph / 社交分享卡片 -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="山河列传 · Atlas of Lives">
  <meta property="og:title" content="山河列传 · Atlas of Lives">
  <meta property="og:description" content="把古今中外人物的一生，落回全球真实山河的叙事地图。">
  <meta property="og:url" content="https://mikezhang09-code.github.io/atlas-of-lives/">
  <meta property="og:image" content="https://mikezhang09-code.github.io/atlas-of-lives/assets/og-cover.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="山河列传 · Atlas of Lives">
  <meta name="twitter:description" content="把古今中外人物的一生，落回全球真实山河的叙事地图。">
  <meta name="twitter:image" content="https://mikezhang09-code.github.io/atlas-of-lives/assets/og-cover.png">

  <link rel="stylesheet" href="lib/maplibre-gl.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main id="app">
    <div id="map" aria-label="人物生平山河地图"></div>
    <div class="paper"></div>
    <div class="vignette"></div>
    <canvas id="mist"></canvas>

    <header class="titlebar">
      <img class="brand-mark" src="assets/logo.svg" width="44" height="44" alt="山河列传 · Atlas of Lives" title="全部人物" decoding="async">
      <p id="titleKicker">真实山河 · 古今人物 · 可漫游叙事地图</p>
      <h1 id="titleHeading">东坡行旅图</h1>
      <p id="titleSubtitle">从眉山到儋州，把苏轼的一生落回山川与江河</p>
    </header>

    <section class="search" aria-label="选择人物并搜索地点或作品">
      <div class="person-field">
        <span class="field-label">人物</span>
        <div id="personSelect" class="person-select">
          <button type="button" id="personTrigger" class="person-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="personCurrent">苏轼 · 东坡</span>
          </button>
          <div id="personPanel" class="person-panel" role="listbox" hidden></div>
        </div>
      </div>
      <label for="searchInput">搜地点 / 诗文</label>
      <div class="search-box">
        <input id="searchInput" type="search" autocomplete="off" placeholder="黄州、赤壁赋、荔枝">
        <button id="searchClear" type="button" aria-label="清空搜索">清</button>
      </div>
      <div id="searchResults" class="search-results" hidden></div>
    </section>

    <aside class="story" aria-live="polite">
      <div class="story-head">
        <span id="storyYears">1037-1101</span>
        <strong id="storyTitle">苏轼生平节点</strong>
      </div>
      <p id="storyText">点击地图上的竖牌，查看地点、诗句与生平事件；也可以用下方按钮切换前后节点。</p>
      <div id="storyWorks" class="works"></div>
      <blockquote id="storyQuote">竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。</blockquote>
      <button id="poemOpen" class="poem-open" type="button">阅读全文</button>
      <div class="progress">
        <span id="progressText">第 1 / 11 站</span>
        <i><b id="progressBar"></b></i>
      </div>
      <div class="story-actions">
        <button id="tourBtn" class="tour-btn" type="button" aria-pressed="false">▶ 自动游历</button>
        <button id="prevBtn" type="button">上一站</button>
        <button id="nextBtn" type="button">下一站</button>
      </div>
    </aside>

    <ol id="timeline" class="timeline" aria-label="人物生平时间线"></ol>

    <section id="poemModal" class="poem-modal" aria-labelledby="poemTitle" aria-modal="true" role="dialog" hidden>
      <button id="poemBackdrop" class="poem-backdrop" type="button" aria-label="关闭诗词全文"></button>
      <article class="poem-sheet">
        <button id="poemClose" class="poem-close" type="button" aria-label="关闭">×</button>
        <p id="poemAuthor" class="poem-author"></p>
        <h2 id="poemTitle"></h2>
        <div id="poemBody" class="poem-body"></div>
        <button id="poemGlossToggle" class="poem-gloss-toggle" type="button" aria-expanded="false" hidden>释义 · 背景与译文 ▾</button>
        <div id="poemGloss" class="poem-gloss" hidden>
          <div id="poemBg" class="poem-gloss-bg"></div>
          <div id="poemEn" class="poem-gloss-en"></div>
          <div id="poemTrans" class="poem-gloss-trans"></div>
        </div>
      </article>
    </section>

    <section id="gallery" class="gallery" role="dialog" aria-label="全部人物" hidden>
      <div class="gallery-inner">
        <button id="galleryClose" class="gallery-close" type="button" aria-label="进入地图">×</button>
        <header class="gallery-head">
          <img src="assets/logo.svg" width="52" height="52" alt="" decoding="async">
          <h2>山河列传 · Atlas of Lives</h2>
          <p>把古今中外人物的一生，落回真实山河 —— 择一人，铺开画卷</p>
        </header>
        <div id="galleryGrid" class="gallery-grid"></div>
      </div>
    </section>

    <div id="loader" class="loader">
      <div>
        <strong>铺开山河画卷</strong>
        <span>正在载入山河疆界、水系与古今人物的行旅节点</span>
      </div>
    </div>
  </main>

  <script src="lib/maplibre-gl.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
